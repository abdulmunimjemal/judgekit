name: Bug report
description: Something broke. Help us reproduce it.
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. judgekit is a small library; bugs are usually about statistical correctness, edge cases in calibration/drift, or integration breakage. Please give us enough to reproduce.

  - type: input
    id: version
    attributes:
      label: judgekit version
      description: Output of `python -c "import judgekit; print(judgekit.__version__)"`.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A self-contained snippet we can paste into a Python REPL. Seed any randomness.
      render: python
      placeholder: |
        import numpy as np
        from judgekit import JudgeHarness, CalibrationSet, LabeledExample
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (and full traceback if any)
      render: shell
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Anything else
      description: Calibration-set size, judge type, integration in use, etc.
