name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel older runs on the same ref/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=src/judgekit --cov-report=term --cov-report=xml --cov-fail-under=85

      - name: Upload coverage (ubuntu/py3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: ruff format --check src tests

  types:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: mypy --strict src/judgekit

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: [test, lint, types]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: twine check (catches PyPI render failures pre-tag)
        run: twine check --strict dist/*
      - name: Verify LICENSE shipped in artifacts
        run: |
          set -euo pipefail
          unzip -p dist/*.whl "*/LICENSE" > /dev/null \
            || (echo "::error::LICENSE missing from wheel" && exit 1)
          tar -tzf dist/*.tar.gz | grep -q '/LICENSE$' \
            || (echo "::error::LICENSE missing from sdist" && exit 1)
      - name: Verify py.typed shipped in wheel
        run: |
          set -euo pipefail
          unzip -p dist/*.whl "judgekit/py.typed" > /dev/null \
            || (echo "::error::py.typed missing from wheel" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
